<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Product</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* ── CARD ── */
    .card {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 16px;
      width: 100%;
      max-width: 430px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    /* ── HEADER ── */
    .card-header {
      padding: 1.5rem 1.5rem 1.25rem;
      border-bottom: 1px solid #f0f2f5;
      background: #fafbfc;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #999;
      text-decoration: none;
      margin-bottom: 1rem;
      font-weight: 500;
      transition: color .12s;
    }
    .back-link:hover { color: #1e3a5f; }
    .back-link i { font-size: 13px; }

    .header-row { display: flex; align-items: center; gap: 13px; }
    .header-icon {
      width: 44px; height: 44px;
      border-radius: 11px;
      background: linear-gradient(135deg, #1e3a5f, #2e6da4);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px;
      box-shadow: 0 4px 12px rgba(30,58,95,0.25);
      flex-shrink: 0;
    }
    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.3px;
    }
    .header-sub { font-size: 12px; color: #999; margin-top: 2px; }

    /* ── BODY ── */
    .card-body { padding: 1.5rem; }

    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      margin-bottom: 7px;
      letter-spacing: .03em;
      text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: #bbb;
      pointer-events: none;
      transition: color .15s;
    }
    .input-wrap input {
      width: 100%;
      padding: 11px 13px 11px 38px;
      border: 1px solid #e8eaed;
      border-radius: 10px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      color: #111;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .input-wrap input:focus {
      border-color: #2e6da4;
      box-shadow: 0 0 0 3px rgba(46,109,164,0.12);
    }
    .input-wrap input:focus + i,
    .input-wrap:focus-within i { color: #2e6da4; }
    .input-wrap input::placeholder { color: #ccc; }
    .hint {
      font-size: 11px;
      color: #bbb;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── FOOTER ── */
    .card-footer {
      padding: 0 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3a5f, #2e6da4);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      box-shadow: 0 4px 14px rgba(30,58,95,0.3);
      transition: transform .15s, box-shadow .15s;
    }
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(30,58,95,0.35);
    }
    .submit-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(30,58,95,0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .divider-line { flex: 1; height: 1px; background: #f0f2f5; }
    .divider-text { font-size: 11px; color: #ccc; font-weight: 500; }

    .cancel-btn {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      background: transparent;
      border: 1px solid #e8eaed;
      color: #888;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background .12s, border-color .12s, color .12s;
    }
    .cancel-btn:hover {
      background: #f5f7fa;
      border-color: #d0d4da;
      color: #444;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <a href="/" class="back-link">
      <i class="ti ti-arrow-left"></i> Back to products
    </a>
    <div class="header-row">
      <div class="header-icon"><i class="ti ti-package"></i></div>
      <div>
        <div class="header-title">Add new product</div>
        <div class="header-sub">Fill in the details below to create a listing</div>
      </div>
    </div>
  </div>

  <form action="/save" method="post">
    <div class="card-body">
      <div class="field">
        <label for="name">Product name</label>
        <div class="input-wrap">
          <i class="ti ti-tag"></i>
          <input type="text" id="name" name="name" placeholder="e.g. Wireless Headphones" required />
        </div>
        <div class="hint">Enter a clear, descriptive product name</div>
      </div>
      <div class="field">
        <label for="price">Price (₹)</label>
        <div class="input-wrap">
          <i class="ti ti-currency-rupee"></i>
          <input type="text" id="price" name="price" placeholder="e.g. 1499" required />
        </div>
        <div class="hint">Enter price in Indian Rupees</div>
      </div>
    </div>

    <div class="card-footer">
      <button type="submit" class="submit-btn">
        <i class="ti ti-device-floppy"></i> Save product
      </button>
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>
      <a href="/" class="cancel-btn">
        <i class="ti ti-x"></i> Cancel
      </a>
    </div>
  </form>
</div>

</body>
</html>
