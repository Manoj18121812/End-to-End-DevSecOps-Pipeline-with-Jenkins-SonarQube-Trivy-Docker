<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Product Service</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 2rem 2rem;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3a5f, #2e6da4);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px;
      box-shadow: 0 4px 12px rgba(30,58,95,0.25);
    }
    .brand-name { font-size: 16px; font-weight: 600; color: #111; letter-spacing: -0.3px; }
    .brand-sub  { font-size: 12px; color: #888; margin-top: 1px; }
    .add-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 20px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3a5f, #2e6da4);
      color: #fff; font-size: 13px; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer;
      box-shadow: 0 4px 14px rgba(30,58,95,0.3);
      transition: transform .15s, box-shadow .15s;
    }
    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(30,58,95,0.35);
    }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 14px;
      padding: 1.1rem 1.25rem;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
    }
    .stat:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    .stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1e3a5f, #2e6da4);
      border-radius: 14px 14px 0 0;
    }
    .stat-label { font-size: 11.5px; color: #888; margin-bottom: 8px; font-weight: 500; letter-spacing: .02em; text-transform: uppercase; }
    .stat-val   { font-size: 26px; font-weight: 600; color: #111; letter-spacing: -0.5px; }
    .stat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 3px 9px; border-radius: 20px;
      margin-top: 6px;
      background: #e8f5e9; color: #2e7d32; font-weight: 500;
    }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; }
    .search-wrap { flex: 1; position: relative; }
    .search-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); font-size: 15px; color: #bbb;
    }
    .search-wrap input {
      width: 100%; padding: 9px 12px 9px 38px;
      border: 1px solid #e8eaed; border-radius: 10px;
      background: #fff; font-size: 13px; color: #111;
      font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap input:focus {
      border-color: #2e6da4;
      box-shadow: 0 0 0 3px rgba(46,109,164,0.12);
    }
    .search-wrap input::placeholder { color: #ccc; }
    .filter-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 16px; border: 1px solid #e8eaed;
      border-radius: 10px; background: #fff;
      font-size: 13px; color: #555; cursor: pointer;
      font-family: inherit;
      transition: background .12s, border-color .12s;
    }
    .filter-btn:hover { background: #f5f7fa; border-color: #d0d4da; }

    /* ── TABLE CARD ── */
    .table-card {
      background: #fff;
      border: 1px solid #e8eaed;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }
    .table-head {
      display: grid;
      grid-template-columns: 60px 1fr 120px 110px 90px;
      padding: 11px 18px;
      background: #fafbfc;
      border-bottom: 1px solid #e8eaed;
    }
    .table-head span {
      font-size: 10.5px; font-weight: 600; color: #999;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .table-row {
      display: grid;
      grid-template-columns: 60px 1fr 120px 110px 90px;
      padding: 13px 18px;
      border-bottom: 1px solid #f3f4f6;
      align-items: center;
      transition: background .12s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: #fafbfd; }

    .id-badge {
      font-size: 11px; padding: 3px 9px;
      border-radius: 20px;
      background: #f0f2f5; color: #555;
      font-weight: 600; display: inline-block;
      letter-spacing: .02em;
    }
    .prod-name { font-size: 13px; font-weight: 500; color: #111; }
    .prod-cat  { font-size: 11px; color: #bbb; margin-top: 2px; }
    .price     { font-size: 13px; font-weight: 600; color: #111; }

    .status {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      font-weight: 500;
    }
    .status.active { background: #e8f5e9; color: #2e7d32; }
    .status.low    { background: #fff8e1; color: #f57f17; }
    .status-dot    { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    .actions { display: flex; gap: 6px; justify-content: flex-end; }
    .act-btn {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid #e8eaed; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; color: #888;
      text-decoration: none;
      transition: all .12s;
    }
    .act-btn:hover         { background: #f0f2f5; color: #111; border-color: #d0d4da; }
    .act-btn.del:hover     { background: #fff0f0; color: #c0392b; border-color: #ffd5d5; }

    /* ── PAGINATION ── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px;
      border-top: 1px solid #e8eaed;
      background: #fafbfc;
    }
    .page-info { font-size: 12px; color: #999; }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid #e8eaed; background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; color: #666;
      font-family: inherit;
      transition: all .12s;
    }
    .page-btn:hover  { background: #f0f2f5; }
    .page-btn.active {
      background: linear-gradient(135deg, #1e3a5f, #2e6da4);
      color: #fff; border-color: transparent;
      box-shadow: 0 2px 8px rgba(30,58,95,0.3);
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-package"></i></div>
      <div>
        <div class="brand-name">Product Service</div>
        <div class="brand-sub">Inventory Management</div>
      </div>
    </div>
    <a href="/new" class="add-btn"><i class="ti ti-plus"></i> Add Product</a>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total Products</div>
      <div class="stat-val" th:text="${#lists.size(list)}">0</div>
      <span class="stat-badge">All items</span>
    </div>
    <div class="stat">
      <div class="stat-label">Active Listings</div>
      <div class="stat-val">—</div>
      <span class="stat-badge">In stock</span>
    </div>
    <div class="stat">
      <div class="stat-label">Avg. Price</div>
      <div class="stat-val">—</div>
      <span class="stat-badge">Catalogue</span>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" placeholder="Search products..." />
    </div>
    <button class="filter-btn"><i class="ti ti-adjustments-horizontal"></i> Filter</button>
    <button class="filter-btn"><i class="ti ti-sort-ascending"></i> Sort</button>
  </div>

  <div class="table-card">
    <div class="table-head">
      <span>ID</span>
      <span>Product</span>
      <span>Price</span>
      <span>Status</span>
      <span style="text-align:right">Actions</span>
    </div>

    <div class="table-row" th:each="product : ${list}">
      <span class="id-badge" th:text="${product.id}"></span>
      <div>
        <div class="prod-name" th:text="${product.name}"></div>
        <div class="prod-cat">Product</div>
      </div>
      <div class="price" th:text="'₹' + ${product.price}"></div>
      <span class="status active"><span class="status-dot"></span>Active</span>
      <div class="actions">
        <a href="#" class="act-btn"><i class="ti ti-edit"></i></a>
        <a th:href="@{/delete/{id}(id=${product.id})}" class="act-btn del"><i class="ti ti-trash"></i></a>
      </div>
    </div>

    <div class="pagination">
      <span class="page-info" th:text="'Showing ' + ${#lists.size(list)} + ' products'">Showing products</span>
      <div class="page-btns">
        <button class="page-btn"><i class="ti ti-chevron-left" style="font-size:13px"></i></button>
        <button class="page-btn active">1</button>
        <button class="page-btn"><i class="ti ti-chevron-right" style="font-size:13px"></i></button>
      </div>
    </div>
  </div>

</body>
</html>
